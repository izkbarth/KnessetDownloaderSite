<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KnessetDownloader</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; line-height: 1.6; }
        input[type="text"] { width: 80%; padding: 10px; font-size: 16px; margin: 20px 0; border: 1px solid #ccc; border-radius: 4px; text-align: left; dir: ltr; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background-color: #6c757d; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h2>KnessetDownloader
    <br>הורדת מסמכי החוק ממאגר החקיקה הלאומי</h2>
    <p>הדבק את כתובת עמוד החוק במאגר החקיקה הלאומי ולחץ על הכפתור כדי להוריד קובץ ZIP מסודר.</p>
    
    <input type="text" id="billUrl" placeholder="https://main.knesset.gov.il/apps/legislation/main/bills/...">
    <br>
    <button id="processBtn">הורד חבילת מסמכים (ZIP)</button>
    <div id="status"></div>

<script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const urlInput = document.getElementById('billUrl').value.trim();
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('processBtn');

            if (!urlInput || !urlInput.includes('knesset.gov.il')) {
                statusDiv.innerHTML = "<span style='color:red;'>נא להזין כתובת תקינה מאתר הכנסת</span>";
                return;
            }

            btn.disabled = true;
            statusDiv.innerText = "השרת סורק את עמוד הכנסת ומכין את ה-ZIP. זה עשוי לקחת חצי דקה...";

            try {
                const response = await fetch(`/download?url=${encodeURIComponent(urlInput)}`);
                
                // אם השרת החזיר שגיאה (סטטוס 500 או 404), נקרא את טקסט השגיאה שהוא שלח
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "השרת נתקל בשגיאה בעיבוד העמוד");
                }

                const disposition = response.headers.get('Content-Disposition');
                let filename = "מסמכי_כנסת.zip";
                if (disposition && disposition.indexOf('filename=') !== -1) {
                    filename = decodeURIComponent(disposition.split('filename=')[1].replace(/"/g, ''));
                }

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();

                statusDiv.innerHTML = "<span style='color:green;'>הקובץ הורד בהצלחה!</span>";
            } catch (err) {
                // הצגת השגיאה המפורטת על המסך
                statusDiv.innerHTML = `<span style='color:red; font-weight:bold;'>שגיאה: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
